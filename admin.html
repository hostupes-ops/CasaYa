<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CasaYa Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#F0F4F8;color:#1E2D4E}
button,input,select{font-family:inherit}
#login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1E2D4E,#2C3E6B)}
.lbox{background:#fff;border-radius:20px;padding:40px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.ltitle{font-size:26px;font-weight:800;text-align:center;color:#1E2D4E;margin-bottom:4px}
.ltitle span{color:#00BFA5}
.lsub{font-size:13px;color:#718096;text-align:center;margin-bottom:28px}
.lerr{background:#FEE2E2;color:#DC2626;border-radius:8px;padding:10px;font-size:13px;text-align:center;margin-bottom:14px;display:none}
.llabel{display:block;font-size:13px;font-weight:700;color:#4A5568;margin-bottom:6px}
.linput{width:100%;border:1.5px solid #E2E8F0;border-radius:10px;padding:12px 14px;font-size:15px;outline:none;margin-bottom:16px}
.linput:focus{border-color:#00BFA5}
.lbtn{width:100%;background:#00BFA5;color:white;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:800;cursor:pointer}
.lbtn:hover{background:#009688}
#app-page{display:none;min-height:100vh}
.layout{display:flex}
.sidebar{width:230px;min-height:100vh;background:linear-gradient(170deg,#1E2D4E,#2C3E6B);position:fixed;top:0;left:0;height:100%;display:flex;flex-direction:column;z-index:10}
.sb-brand{padding:26px 22px 18px;font-size:20px;font-weight:800;color:#fff;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-brand span{color:#00BFA5}
.sb-nav{flex:1;padding:14px 10px;display:flex;flex-direction:column;gap:3px}
.nbtn{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;border:none;background:none;color:rgba(255,255,255,.6);font-size:13px;font-weight:600;cursor:pointer;width:100%;text-align:left}
.nbtn:hover{background:rgba(255,255,255,.08);color:#fff}
.nbtn.on{background:rgba(0,191,165,.18);color:#00BFA5}
.nbi{font-size:16px;width:22px;text-align:center}
.nbadge{margin-left:auto;background:#DC2626;color:#fff;font-size:10px;font-weight:800;padding:1px 6px;border-radius:10px;display:none}
.sb-foot{padding:14px 10px;border-top:1px solid rgba(255,255,255,.1)}
.sbu{display:flex;align-items:center;gap:10px;padding:8px 12px;margin-bottom:6px}
.sbav{width:34px;height:34px;border-radius:50%;background:#00BFA5;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.sbun{font-size:13px;font-weight:600;color:rgba(255,255,255,.8)}
.sbur{font-size:11px;color:rgba(255,255,255,.4)}
.sblout{width:100%;background:rgba(255,255,255,.07);border:none;border-radius:8px;padding:8px;font-size:12px;font-weight:600;color:rgba(255,255,255,.45);cursor:pointer}
.sblout:hover{background:rgba(255,255,255,.13);color:#fff}
.main{margin-left:230px;flex:1;padding:28px}
.ptitle{font-size:22px;font-weight:800;color:#1E2D4E;margin-bottom:4px}
.psub{font-size:13px;color:#718096;margin-bottom:24px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.stat{background:#fff;border-radius:14px;padding:18px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.stic{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:10px}
.stv{font-size:26px;font-weight:800;color:#1E2D4E}
.stl{font-size:11px;color:#718096;margin-top:3px}
.stb{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-top:6px}
.card{background:#fff;border-radius:14px;box-shadow:0 2px 10px rgba(0,0,0,.06);overflow:hidden;margin-bottom:20px}
.chead{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid #F0F4F8;flex-wrap:wrap;gap:10px}
.ctitle{font-size:15px;font-weight:800;color:#1E2D4E}
.cacts{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.sinp{border:1.5px solid #E2E8F0;border-radius:8px;padding:7px 12px;font-size:13px;outline:none;width:190px}
.sinp:focus{border-color:#00BFA5}
.fsel{border:1.5px solid #E2E8F0;border-radius:8px;padding:7px 12px;font-size:13px;outline:none;background:#fff;cursor:pointer}
table{width:100%;border-collapse:collapse}
thead{background:#F8FAFC}
th{padding:10px 18px;text-align:left;font-size:10px;font-weight:700;color:#718096;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #F0F4F8;white-space:nowrap}
td{padding:12px 18px;font-size:13px;border-bottom:1px solid #F8FAFC;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FAFBFC}
.av{width:38px;height:38px;border-radius:9px;background:#E0F7F4;display:flex;align-items:center;justify-content:center;font-size:17px;overflow:hidden;flex-shrink:0}
.av img{width:100%;height:100%;object-fit:cover}
.pn{font-weight:700;font-size:13px;color:#1E2D4E}
.ps{font-size:11px;color:#718096;margin-top:1px}
.b{display:inline-flex;align-items:center;border-radius:12px;font-size:11px;font-weight:700;padding:3px 9px;white-space:nowrap}
.bg{background:#E0F7F4;color:#009688}
.by{background:#FFF8E1;color:#D97706}
.br{background:#FEE2E2;color:#DC2626}
.bgr{background:#F1F5F9;color:#64748B}
.bb{background:#EFF6FF;color:#3B82F6}
.btn{border:none;border-radius:8px;padding:6px 13px;font-size:12px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.bt{background:#00BFA5;color:#fff}
.btg{background:#E0F7F4;color:#009688}
.btr{background:#FEE2E2;color:#DC2626}
.btgr{background:#F1F5F9;color:#64748B}
.btn:hover{opacity:.85}
.empty{text-align:center;padding:50px 20px;color:#718096}
.empty em{font-size:44px;display:block;margin-bottom:12px;font-style:normal}
.empty strong{font-size:15px;font-weight:600;color:#1E2D4E;display:block}
.loading-msg{text-align:center;padding:50px;color:#718096;font-size:14px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:18px;width:100%;max-width:680px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.mhd{display:flex;align-items:center;justify-content:space-between;padding:22px 26px;border-bottom:1px solid #F0F4F8;position:sticky;top:0;background:#fff;z-index:5}
.mhd h2{font-size:17px;font-weight:800;color:#1E2D4E}
.mbd{padding:26px}
.msec{margin-bottom:22px}
.mst{font-size:11px;font-weight:800;color:#1E2D4E;text-transform:uppercase;letter-spacing:.5px;padding-bottom:8px;border-bottom:1px solid #F0F4F8;margin-bottom:14px}
.mgr{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.dr{display:flex;flex-direction:column;gap:3px;margin-bottom:12px}
.dk{font-size:10px;font-weight:700;color:#718096;text-transform:uppercase;letter-spacing:.5px}
.dv{font-size:14px;color:#1E2D4E;font-weight:500}
.pgr{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.pi{border-radius:10px;overflow:hidden;aspect-ratio:4/3;background:#F8FAFC;display:flex;align-items:center;justify-content:center;border:1px solid #E2E8F0}
.pi img{width:100%;height:100%;object-fit:cover}
.pl{font-size:10px;color:#718096;text-align:center;margin-top:5px;font-weight:600}
.svct{width:100%;border-collapse:collapse;font-size:12px}
.svct th{text-align:left;padding:7px 10px;background:#F8FAFC;font-size:10px;font-weight:700;color:#718096;text-transform:uppercase}
.svct td{padding:9px 10px;border-bottom:1px solid #F8FAFC}
.tabs{display:flex;gap:3px;background:#F0F4F8;border-radius:10px;padding:3px;margin-bottom:18px;width:fit-content}
.tab{padding:7px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:none;color:#718096}
.tab.on{background:#fff;color:#1E2D4E;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.toast{position:fixed;bottom:20px;right:20px;background:#1E2D4E;color:#fff;padding:12px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,.2);display:none}
@media(max-width:768px){.sidebar{width:190px}.main{margin-left:190px;padding:16px}.stats{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<div id="login-page">
  <div class="lbox">
    <div class="ltitle">Casa<span>Ya</span></div>
    <div class="lsub">Panel de Administracion</div>
    <div class="lerr" id="lerr">Contrasena incorrecta</div>
    <label class="llabel">Contrasena</label>
    <input class="linput" type="password" id="pi" placeholder="Ingresa la contrasena"/>
    <button class="lbtn" id="lbtn">Entrar al panel</button>
  </div>
</div>

<div id="app-page">
  <div class="layout">
    <aside class="sidebar">
      <div class="sb-brand">Casa<span>Ya</span></div>
      <nav class="sb-nav">
        <button class="nbtn on" data-pg="dashboard"><span class="nbi">&#128202;</span>Dashboard</button>
        <button class="nbtn" data-pg="profesionales"><span class="nbi">&#128101;</span>Profesionales</button>
        <button class="nbtn" data-pg="verificacion"><span class="nbi">&#128274;</span>Verificacion <span class="nbadge" id="vbadge">0</span></button>
        <button class="nbtn" data-pg="reservas"><span class="nbi">&#128197;</span>Reservas</button>
      </nav>
      <div class="sb-foot">
        <div class="sbu"><div class="sbav">&#128081;</div><div><div class="sbun">Admin</div><div class="sbur">CasaYa</div></div></div>
        <button class="sblout" id="lout">Cerrar sesion</button>
      </div>
    </aside>
    <main class="main" id="main"></main>
  </div>
  <div id="mc"></div>
  <div class="toast" id="toast"></div>
</div>

<script>
var PASS = "casaya2025admin";
var SURL = "https://olfbnucblnzijfuytjgs.supabase.co";
var SKEY = "sb_publishable_SOOuRm-nwNBJlX-7GkH4Cg_cEAZ6wIx";
var sb = null;
var pros = [];
var page = "dashboard";
var sq = "";
var sf = "todos";
var stab = "pendientes";

function ci(c){return {limpieza:"&#x1F9F9;",cuidado:"&#x1F469;&#x200D;&#x2695;&#xFE0F;",belleza:"&#x1F485;"}[c]||"&#x1F464;";}
function cl(c){return {limpieza:"Limpieza",cuidado:"Cuidado",belleza:"Belleza"}[c]||c||"-";}
function cc(c){return {limpieza:"bb",cuidado:"by",belleza:"bg"}[c]||"bgr";}
function fd(d){return d?new Date(d).toLocaleDateString("es-ES",{day:"2-digit",month:"short",year:"numeric"}):"-";}
function avHTML(p){return p.avatar_url?'<div class="av"><img src="'+p.avatar_url+'"/></div>':'<div class="av">'+ci(p.categoria)+'</div>';}
function vb(p){return p.verificado?'<span class="b bg">&#x2713; Verificado</span>':p.foto_carnet_frente?'<span class="b by">&#x23F3; Docs enviados</span>':'<span class="b bgr">Sin docs</span>';}
function ab(p){return '<span class="b '+(p.activo?"bg":"br")+'">'+(p.activo?"Activo":"Inactivo")+'</span>';}

function toast(msg){var t=document.getElementById("toast");t.textContent="OK "+msg;t.style.display="block";setTimeout(function(){t.style.display="none";},3000);}

function updbadge(){
  var n=pros.filter(function(p){return p.foto_carnet_frente&&!p.verificado;}).length;
  var b=document.getElementById("vbadge");
  if(b){b.textContent=n;b.style.display=n>0?"inline":"none";}
}

function goto(pg){
  page=pg;sq="";sf="todos";
  document.querySelectorAll(".nbtn").forEach(function(b){b.classList.toggle("on",b.getAttribute("data-pg")===pg);});
  draw();
}

function draw(){
  var m=document.getElementById("main");
  if(page==="dashboard") m.innerHTML=dashH();
  else if(page==="profesionales") m.innerHTML=prosH();
  else if(page==="verificacion") m.innerHTML=verifH();
  else m.innerHTML='<div class="ptitle">Reservas</div><div class="psub">Proximamente</div><div class="card"><div class="empty"><em>&#128197;</em><strong>Proximamente</strong><span style="font-size:13px;margin-top:6px;display:block">Las reservas apareceran aqui</span></div></div>';
  bindPg();
}

function stcard(icon,bg,val,label,extra){
  return '<div class="stat"><div class="stic" style="background:'+bg+'">'+icon+'</div><div class="stv">'+val+'</div><div class="stl">'+label+'</div>'+extra+'</div>';
}

function dashH(){
  var tot=pros.length,act=pros.filter(function(p){return p.activo;}).length;
  var ver=pros.filter(function(p){return p.verificado;}).length;
  var pen=pros.filter(function(p){return p.foto_carnet_frente&&!p.verificado;}).length;
  var lim=0,cui=0,bel=0;
  pros.forEach(function(p){if(p.categoria==="limpieza")lim++;else if(p.categoria==="cuidado")cui++;else if(p.categoria==="belleza")bel++;});
  var rec=pros.slice(0,6);
  var rows=rec.length===0?'<div class="empty"><em>&#128101;</em><strong>Sin registros aun</strong></div>':
    '<table><thead><tr><th>Profesional</th><th>Categoria</th><th>Ciudad</th><th>Verificacion</th><th>Fecha</th></tr></thead><tbody>'+
    rec.map(function(p){return '<tr><td><div style="display:flex;align-items:center;gap:10px">'+avHTML(p)+'<div><div class="pn">'+(p.nombre||"-")+'</div><div class="ps">'+(p.whatsapp||"")+'</div></div></div></td>'+
    '<td><span class="b '+cc(p.categoria)+'">'+cl(p.categoria)+'</span></td>'+
    '<td style="color:#718096">'+(p.ciudad||"-")+'</td>'+
    '<td>'+vb(p)+'</td>'+
    '<td style="color:#718096;font-size:12px">'+fd(p.created_at)+'</td></tr>';}).join("")+
    '</tbody></table>';
  return '<div class="ptitle">Dashboard</div><div class="psub">Resumen general de CasaYa</div>'+
    '<div class="stats">'+
    stcard("&#128101;","#E0F7F4",tot,"Profesionales",'<span class="stb bg">'+act+' activos</span>')+
    stcard("&#9989;","#EFF6FF",ver,"Verificados",pen>0?'<span class="stb by">'+pen+' pendientes</span>':'<span class="stb bg">Al dia</span>')+
    stcard("&#129529;","#FFF8E1",lim,"Limpieza","")+
    stcard("&#128133;","#F3E8FF",bel+cui,"Belleza y Cuidado","")+
    '</div>'+
    '<div class="card"><div class="chead"><div class="ctitle">Ultimos registros</div><button class="btn btgr" id="gobtn">Ver todos</button></div>'+rows+'</div>';
}

function prosH(){
  var list=pros;
  if(sq){var q=sq.toLowerCase();list=list.filter(function(p){return (p.nombre||"").toLowerCase().indexOf(q)>-1||(p.ciudad||"").toLowerCase().indexOf(q)>-1||(p.whatsapp||"").indexOf(q)>-1;});}
  if(sf!=="todos") list=list.filter(function(p){return p.categoria===sf;});
  var rows=list.length===0?'<div class="empty"><em>&#128269;</em><strong>Sin resultados</strong></div>':
    '<table><thead><tr><th>Profesional</th><th>Categoria</th><th>Ciudad</th><th>Verificacion</th><th>Estado</th><th>Acciones</th></tr></thead><tbody>'+
    list.map(function(p){
      var btns='<div style="display:flex;gap:5px;flex-wrap:wrap">'+
        '<button class="btn btgr" data-a="view" data-id="'+p.id+'">Ver</button>'+
        (p.activo?'<button class="btn btr" data-a="off" data-id="'+p.id+'">Off</button>':'<button class="btn btg" data-a="on" data-id="'+p.id+'">On</button>')+
        (!p.verificado&&p.foto_carnet_frente?'<button class="btn bt" data-a="ver" data-id="'+p.id+'">Verificar</button>':"")+
        '<button class="btn btr" data-a="del" data-id="'+p.id+'">Eliminar</button>'+
        '</div>';
      return '<tr><td><div style="display:flex;align-items:center;gap:10px">'+avHTML(p)+'<div><div class="pn">'+(p.nombre||"-")+'</div><div class="ps">'+(p.whatsapp||"")+'</div></div></div></td>'+
        '<td><span class="b '+cc(p.categoria)+'">'+cl(p.categoria)+'</span></td>'+
        '<td style="color:#718096">'+(p.ciudad||"-")+'</td>'+
        '<td>'+vb(p)+'</td><td>'+ab(p)+'</td><td>'+btns+'</td></tr>';
    }).join("")+'</tbody></table>';
  return '<div class="ptitle">Profesionales</div><div class="psub">'+pros.length+' registrados</div>'+
    '<div class="card"><div class="chead"><div class="ctitle">Todos</div>'+
    '<div class="cacts"><input class="sinp" id="srch" placeholder="Buscar..." value="'+sq+'"/>'+
    '<select class="fsel" id="fcat"><option value="todos">Todas</option>'+
    '<option value="limpieza"'+(sf==="limpieza"?" selected":"")+'>Limpieza</option>'+
    '<option value="cuidado"'+(sf==="cuidado"?" selected":"")+'>Cuidado</option>'+
    '<option value="belleza"'+(sf==="belleza"?" selected":"")+'>Belleza</option>'+
    '</select><button class="btn btgr" id="rfbtn">Actualizar</button></div></div>'+rows+'</div>';
}

function verifH(){
  var pen=pros.filter(function(p){return p.foto_carnet_frente&&!p.verificado;});
  var ver=pros.filter(function(p){return p.verificado;});
  var list=stab==="pendientes"?pen:ver;
  var cards=list.length===0?'<div class="card"><div class="empty"><em>'+(stab==="pendientes"?"&#127881;":"&#128203;")+'</em><strong>'+(stab==="pendientes"?"Sin pendientes":"Sin verificados")+'</strong></div></div>':
    list.map(function(p){
      var photos=['<div><div class="pi">'+(p.foto_carnet_frente?'<img src="'+p.foto_carnet_frente+'"/>':'<span style="font-size:28px;color:#CBD5E0">&#128298;</span>')+'</div><div class="pl">Carnet frente</div></div>',
        '<div><div class="pi">'+(p.foto_carnet_reverso?'<img src="'+p.foto_carnet_reverso+'"/>':'<span style="font-size:28px;color:#CBD5E0">&#128298;</span>')+'</div><div class="pl">Carnet reverso</div></div>',
        '<div><div class="pi">'+(p.foto_selfie_carnet?'<img src="'+p.foto_selfie_carnet+'"/>':'<span style="font-size:28px;color:#CBD5E0">&#129323;</span>')+'</div><div class="pl">Selfie</div></div>'].join("");
      return '<div class="card" style="margin-bottom:16px"><div class="chead"><div style="display:flex;align-items:center;gap:12px">'+avHTML(p)+
        '<div><div style="font-size:15px;font-weight:800">'+(p.nombre||"-")+'</div><div style="font-size:12px;color:#718096">'+(p.whatsapp||"")+' - '+(p.ciudad||"-")+'</div></div></div>'+
        '<div style="display:flex;gap:8px">'+(!p.verificado?'<button class="btn bt" data-a="ver" data-id="'+p.id+'">Aprobar</button>':'<span class="b bg">Verificado</span>')+
        '<button class="btn btgr" data-a="view" data-id="'+p.id+'">Ver</button></div></div>'+
        '<div style="padding:18px 22px"><div class="pgr">'+photos+'</div>'+
        (p.direccion_domicilio?'<div style="margin-top:10px;background:#F8FAFC;border-radius:8px;padding:10px 14px;font-size:13px"><strong>Direccion:</strong> '+p.direccion_domicilio+'</div>':"")+
        '</div></div>';
    }).join("");
  return '<div class="ptitle">Verificacion</div><div class="psub">Revisa los documentos</div>'+
    '<div class="tabs"><button class="tab'+(stab==="pendientes"?" on":"")+'" data-tb="pendientes">Pendientes ('+pen.length+')</button>'+
    '<button class="tab'+(stab==="verificados"?" on":"")+'" data-tb="verificados">Verificados ('+ver.length+')</button></div>'+cards;
}

function showModal(id){
  var p=pros.find(function(x){return x.id===id;});
  if(!p) return;
  var svcs=p.servicios||[];
  var svctable=svcs.length?'<div class="msec"><div class="mst">Servicios y precios</div><table class="svct"><thead><tr><th>Servicio</th><th>Precio</th><th>Duracion</th></tr></thead><tbody>'+svcs.map(function(s){return'<tr><td style="font-weight:600">'+(s.name||"-")+'</td><td style="color:#00BFA5;font-weight:700">'+(s.price?s.price+" CUP":"-")+'</td><td>'+(s.duration||"-")+'</td></tr>';}).join("")+'</tbody></table></div>':"";
  var docs=(p.foto_carnet_frente||p.foto_carnet_reverso||p.foto_selfie_carnet)?
    '<div class="msec"><div class="mst">Documentos</div><div class="pgr">'+
    '<div><div class="pi">'+(p.foto_carnet_frente?'<img src="'+p.foto_carnet_frente+'"/>':'<span style="font-size:24px;color:#CBD5E0">&#128298;</span>')+'</div><div class="pl">Carnet frente</div></div>'+
    '<div><div class="pi">'+(p.foto_carnet_reverso?'<img src="'+p.foto_carnet_reverso+'"/>':'<span style="font-size:24px;color:#CBD5E0">&#128298;</span>')+'</div><div class="pl">Carnet reverso</div></div>'+
    '<div><div class="pi">'+(p.foto_selfie_carnet?'<img src="'+p.foto_selfie_carnet+'"/>':'<span style="font-size:24px;color:#CBD5E0">&#129323;</span>')+'</div><div class="pl">Selfie</div></div>'+
    '</div>'+(p.direccion_domicilio?'<div style="margin-top:10px;background:#F8FAFC;border-radius:8px;padding:10px 12px;font-size:12px">'+p.direccion_domicilio+'</div>':"")+
    '</div>':'';
  var acts='<div style="display:flex;gap:8px;flex-wrap:wrap;padding-top:8px;border-top:1px solid #F0F4F8">'+
    (!p.verificado&&p.foto_carnet_frente?'<button class="btn bt" data-a="ver" data-id="'+p.id+'">Verificar</button>':"")+
    (p.activo?'<button class="btn btr" data-a="off" data-id="'+p.id+'">Desactivar</button>':'<button class="btn btg" data-a="on" data-id="'+p.id+'">Activar</button>')+
    (p.whatsapp?'<a href="https://wa.me/'+p.whatsapp.replace(/\D/g,"")+'" target="_blank" class="btn btgr">WhatsApp</a>':"")+
    '<button class="btn btr" style="margin-left:auto" data-a="del" data-id="'+p.id+'">Eliminar</button>'+
    '</div>';
  document.getElementById("mc").innerHTML=
    '<div class="modal-bg" id="mbg"><div class="modal">'+
    '<div class="mhd"><h2>'+(p.nombre||"Profesional")+'</h2><button class="btn btgr" id="cmo">Cerrar</button></div>'+
    '<div class="mbd">'+
    '<div class="msec"><div class="mst">Informacion personal</div><div class="mgr">'+
    dr("Nombre",p.nombre||"-")+dr("WhatsApp",p.whatsapp?'<a href="https://wa.me/'+p.whatsapp.replace(/\D/g,"")+'" target="_blank" style="color:#00BFA5;font-weight:700">'+p.whatsapp+'</a>':"-")+
    dr("Ciudad",p.ciudad||"-")+dr("Zonas",p.zonas||"-")+dr("Categoria",cl(p.categoria))+dr("Experiencia",p.experiencia||"-")+dr("Estado",ab(p))+dr("Verificado",vb(p))+dr("Fecha",fd(p.created_at))+
    '</div>'+(p.bio?'<div class="dr"><div class="dk">Sobre mi</div><div class="dv">'+p.bio+'</div></div>':"")+
    '</div>'+
    (p.avatar_url?'<div class="msec"><div class="mst">Foto de perfil</div><img src="'+p.avatar_url+'" style="width:90px;height:90px;border-radius:50%;object-fit:cover;border:3px solid #00BFA5"/></div>':"")+
    svctable+docs+acts+
    '</div></div></div>';
  document.getElementById("cmo").onclick=closeMo;
  document.getElementById("mbg").onclick=function(e){if(e.target.id==="mbg")closeMo();};
  document.querySelectorAll("#mc [data-a]").forEach(function(b){b.addEventListener("click",function(e){e.stopPropagation();act(b.getAttribute("data-a"),b.getAttribute("data-id"));});});
}

function closeMo(){document.getElementById("mc").innerHTML="";}

function dr(k,v){return '<div class="dr"><div class="dk">'+k+'</div><div class="dv">'+v+'</div></div>';}

function act(a,id){
  if(a==="view") showModal(id);
  else if(a==="ver") doVerify(id);
  else if(a==="on")  doToggle(id,true);
  else if(a==="off") doToggle(id,false);
  else if(a==="del") doDel(id);
}

async function doVerify(id){
  if(!confirm("Verificar este profesional?")) return;
  var r=await sb.from("profesionales").update({verificado:true}).eq("id",id);
  if(!r.error){pros=pros.map(function(p){return p.id===id?Object.assign({},p,{verificado:true}):p;});updbadge();toast("Verificado correctamente");closeMo();draw();}
}

async function doToggle(id,on){
  var r=await sb.from("profesionales").update({activo:on}).eq("id",id);
  if(!r.error){pros=pros.map(function(p){return p.id===id?Object.assign({},p,{activo:on}):p;});toast(on?"Activado":"Desactivado");closeMo();draw();}
}

async function doDel(id){
  if(!confirm("Eliminar este profesional? No se puede deshacer.")) return;
  var r=await sb.from("profesionales").delete().eq("id",id);
  if(!r.error){pros=pros.filter(function(p){return p.id!==id;});updbadge();toast("Eliminado");closeMo();draw();}
}

async function loadPros(){
  document.getElementById("main").innerHTML='<div class="loading-msg">Cargando datos...</div>';
  try{
    var r=await sb.from("profesionales").select("*").order("created_at",{ascending:false});
    if(r.error) throw r.error;
    pros=r.data||[];
    updbadge();
    draw();
  }catch(e){
    document.getElementById("main").innerHTML='<div class="empty"><em>X</em><strong>Error de conexion</strong><span>'+e.message+'</span></div>';
  }
}

function bindPg(){
  var s=document.getElementById("srch");
  if(s) s.addEventListener("input",function(){sq=s.value;document.getElementById("main").innerHTML=prosH();bindPg();});
  var f=document.getElementById("fcat");
  if(f) f.addEventListener("change",function(){sf=f.value;document.getElementById("main").innerHTML=prosH();bindPg();});
  var rf=document.getElementById("rfbtn");
  if(rf) rf.addEventListener("click",loadPros);
  var gp=document.getElementById("gobtn");
  if(gp) gp.addEventListener("click",function(){goto("profesionales");});
  document.querySelectorAll(".tab").forEach(function(t){t.addEventListener("click",function(){stab=t.getAttribute("data-tb");draw();});});
  document.querySelectorAll("[data-a]").forEach(function(b){b.addEventListener("click",function(e){e.stopPropagation();act(b.getAttribute("data-a"),b.getAttribute("data-id"));});});
}

window.addEventListener("load",function(){
  var lbtn=document.getElementById("lbtn");
  var pi=document.getElementById("pi");

  function tryLogin(){
    if(pi.value===PASS){
      document.getElementById("login-page").style.display="none";
      document.getElementById("app-page").style.display="block";
      var s=document.createElement("script");
      s.src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js";
      s.onload=function(){sb=supabase.createClient(SURL,SKEY);loadPros();};
      s.onerror=function(){document.getElementById("main").innerHTML='<div class="empty"><em>X</em><strong>Error cargando Supabase</strong></div>';};
      document.head.appendChild(s);
    } else {
      document.getElementById("lerr").style.display="block";
      pi.value="";pi.focus();
    }
  }

  lbtn.addEventListener("click",tryLogin);
  pi.addEventListener("keydown",function(e){if(e.key==="Enter")tryLogin();});

  document.getElementById("lout").addEventListener("click",function(){
    document.getElementById("app-page").style.display="none";
    document.getElementById("login-page").style.display="flex";
    pi.value="";pros=[];
  });

  document.querySelectorAll(".nbtn[data-pg]").forEach(function(b){
    b.addEventListener("click",function(){goto(b.getAttribute("data-pg"));});
  });
});
</script>

</body>
</html>
