<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CasaYa — Panel Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#F0F4F8;color:#1E2D4E;min-height:100vh}
input,textarea,select,button{font-family:'Plus Jakarta Sans',sans-serif}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(145deg,#1E2D4E,#2C3E6B);padding:24px}
.login-card{background:white;border-radius:24px;padding:40px 32px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,0.2)}
.login-logo{font-size:28px;font-weight:800;color:#1E2D4E;text-align:center;margin-bottom:6px}
.login-logo span{color:#00BFA5}
.login-sub{font-size:13px;color:#718096;text-align:center;margin-bottom:32px}
.login-err{background:#FEE2E2;color:#DC2626;border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:16px;text-align:center}
.layout{display:flex;min-height:100vh}
.sidebar{width:240px;background:linear-gradient(170deg,#1E2D4E,#2C3E6B);flex-shrink:0;position:fixed;top:0;left:0;height:100vh;z-index:100;display:flex;flex-direction:column}
.sb-logo{padding:28px 24px 20px;font-size:22px;font-weight:800;color:white;letter-spacing:-.5px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-logo span{color:#00BFA5}
.sb-nav{flex:1;padding:16px 12px;display:flex;flex-direction:column;gap:4px;overflow-y:auto}
.sb-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:12px;cursor:pointer;color:rgba(255,255,255,.65);font-size:14px;font-weight:600;border:none;background:none;width:100%;text-align:left}
.sb-item:hover{background:rgba(255,255,255,.08);color:white}
.sb-item.active{background:rgba(0,191,165,.2);color:#00BFA5}
.sb-bottom{padding:16px 12px;border-top:1px solid rgba(255,255,255,.1)}
.sb-user{display:flex;align-items:center;gap:10px;padding:10px 14px}
.sb-avatar{width:36px;height:36px;border-radius:50%;background:#00BFA5;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.sb-name{font-size:13px;font-weight:600;color:rgba(255,255,255,.8)}
.sb-role{font-size:11px;color:rgba(255,255,255,.4)}
.sb-logout{width:100%;margin-top:8px;background:rgba(255,255,255,.07);border:none;border-radius:10px;padding:9px;font-size:13px;font-weight:600;color:rgba(255,255,255,.5);cursor:pointer}
.main{margin-left:240px;flex:1;padding:32px}
.page-title{font-size:24px;font-weight:800;color:#1E2D4E;margin-bottom:6px}
.page-sub{font-size:14px;color:#718096;margin-bottom:28px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.stat-card{background:white;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.stat-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:12px}
.stat-val{font-size:28px;font-weight:800;color:#1E2D4E}
.stat-label{font-size:12px;color:#718096;margin-top:4px;font-weight:500}
.table-wrap{background:white;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.06);overflow:hidden;margin-bottom:24px}
.table-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid #F0F4F8;flex-wrap:wrap;gap:12px}
.table-title{font-size:16px;font-weight:800;color:#1E2D4E}
.table-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.search-inp{border:1.5px solid #E2E8F0;border-radius:10px;padding:8px 14px;font-size:13px;outline:none;width:200px}
.search-inp:focus{border-color:#00BFA5}
.filter-sel{border:1.5px solid #E2E8F0;border-radius:10px;padding:8px 14px;font-size:13px;outline:none;cursor:pointer;background:white}
table{width:100%;border-collapse:collapse}
thead tr{background:#F8FAFC}
th{padding:12px 20px;text-align:left;font-size:11px;font-weight:700;color:#718096;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #F0F4F8;white-space:nowrap}
td{padding:14px 20px;font-size:13px;color:#1E2D4E;border-bottom:1px solid #F8FAFC;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FAFBFC}
.td-name{display:flex;align-items:center;gap:12px}
.td-avatar{width:40px;height:40px;border-radius:10px;flex-shrink:0;background:#E0F7F4;display:flex;align-items:center;justify-content:center;font-size:18px;overflow:hidden}
.td-avatar img{width:100%;height:100%;object-fit:cover}
.td-main{font-weight:700}
.td-sub{font-size:11px;color:#718096;margin-top:2px}
.badge{display:inline-flex;align-items:center;gap:4px;border-radius:20px;font-size:11px;font-weight:700;padding:4px 10px;white-space:nowrap}
.bg{background:#E0F7F4;color:#009688}
.by{background:#FFF8E1;color:#D97706}
.br{background:#FEE2E2;color:#DC2626}
.bgr{background:#F1F5F9;color:#64748B}
.bb{background:#EFF6FF;color:#3B82F6}
.btn{border:none;border-radius:10px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.bt{background:#00BFA5;color:white}
.btg{background:#E0F7F4;color:#009688}
.btr{background:#FEE2E2;color:#DC2626}
.btgr{background:#F1F5F9;color:#64748B}
.btn-sm{padding:5px 12px;font-size:12px}
.fi{background:white;border:1.5px solid #E2E8F0;border-radius:12px;padding:11px 14px;font-size:14px;color:#1E2D4E;outline:none;width:100%}
.fi:focus{border-color:#00BFA5}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px}
.modal{background:white;border-radius:20px;width:100%;max-width:700px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:24px 28px;border-bottom:1px solid #F0F4F8;position:sticky;top:0;background:white;z-index:10}
.modal-head h2{font-size:18px;font-weight:800;color:#1E2D4E}
.modal-body{padding:28px}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.msec{margin-bottom:24px}
.msec-title{font-size:12px;font-weight:800;color:#1E2D4E;text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid #F0F4F8}
.dr{display:flex;flex-direction:column;gap:4px;margin-bottom:14px}
.dk{font-size:11px;font-weight:700;color:#718096;text-transform:uppercase;letter-spacing:.5px}
.dv{font-size:14px;color:#1E2D4E;font-weight:500}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.photo-item{border-radius:12px;overflow:hidden;aspect-ratio:4/3;background:#F8FAFC;display:flex;align-items:center;justify-content:center;border:1px solid #E2E8F0}
.photo-item img{width:100%;height:100%;object-fit:cover}
.photo-label{font-size:11px;color:#718096;text-align:center;margin-top:6px;font-weight:600}
.st{width:100%;border-collapse:collapse;font-size:13px}
.st th{text-align:left;padding:8px 12px;background:#F8FAFC;font-size:11px;font-weight:700;color:#718096;text-transform:uppercase}
.st td{padding:10px 12px;border-bottom:1px solid #F8FAFC}
.empty-state{text-align:center;padding:60px 24px;color:#718096}
.loading-state{text-align:center;padding:60px;color:#718096;font-size:14px}
.toast{position:fixed;bottom:24px;right:24px;background:#1E2D4E;color:white;padding:14px 20px;border-radius:12px;font-size:14px;font-weight:600;z-index:999;box-shadow:0 8px 24px rgba(0,0,0,.2);display:flex;align-items:center;gap:10px}
.tabs{display:flex;gap:4px;background:#F0F4F8;border-radius:12px;padding:4px;margin-bottom:20px;width:fit-content}
.tab{padding:8px 18px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:none;color:#718096}
.tab.active{background:white;color:#1E2D4E;box-shadow:0 1px 4px rgba(0,0,0,.08)}
@media(max-width:768px){.sidebar{width:200px}.main{margin-left:200px;padding:20px}.stats-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div id="app"></div>
<script>
const SB_URL = "https://olfbnucblnzijfuytjgs.supabase.co";
const SB_KEY = "sb_publishable_SOOuRm-nwNBJlX-7GkH4Cg_cEAZ6wIx";
const sb = window.supabase.createClient(SB_URL, SB_KEY);
const ADMIN_PASS = "casaya2025admin";

let S = {
logged:false, page:“dashboard”, pros:[], loading:false,
selected:null, search:””, filter:“todos”, toast:null, tab:“pendientes”
};

function r(){ document.getElementById(“app”).innerHTML = S.logged ? appHTML() : loginHTML(); bind(); if(S.toast) setTimeout(()=>{S.toast=null;r();},3000); }

function toast(msg,icon=“OK”){ S.toast={msg,icon}; r(); }

// ─ LOGIN ─
function loginHTML(){
return ‘<div class="login-wrap"><div class="login-card">’
+’<div class="login-logo">Casa<span>Ya</span></div>’
+’<div class="login-sub">Panel de Administración</div>’
+(S.loginErr?’<div class="login-err">Contraseña incorrecta</div>’:””)
+’<div style="display:flex;flex-direction:column;gap:14px">’
+’<div><label style="font-size:13px;font-weight:700;color:#4A5568;display:block;margin-bottom:6px">Contraseña</label>’
+’<input class="fi" type="password" id="pi" placeholder="Ingresa la contraseña" style="font-size:15px"/></div>’
+’<button id="bl" class="btn bt" style="width:100%;padding:14px;font-size:15px;border-radius:12px;justify-content:center">Entrar al panel</button>’
+’</div></div></div>’;
}

// ─ APP ─
function appHTML(){
const nav=[
{id:“dashboard”,icon:“📊”,label:“Dashboard”},
{id:“profesionales”,icon:“👥”,label:“Profesionales”},
{id:“verificacion”,icon:“🔒”,label:“Verificación”,n:S.pros.filter(p=>p.foto_carnet_frente&&!p.verificado).length},
{id:“reservas”,icon:“📅”,label:“Reservas”},
];
return ‘<div class="layout">’
+’<aside class="sidebar">’
+’<div class="sb-logo">Casa<span>Ya</span> <span style="font-size:11px;font-weight:500;color:rgba(255,255,255,.3)">Admin</span></div>’
+’<nav class="sb-nav">’+nav.map(x=>’<button class=“sb-item’+(S.page===x.id?” active”:””)+’” data-pg=”’+x.id+’”>’
+’<span style="font-size:18px;width:24px;text-align:center">’+x.icon+’</span>’+x.label
+(x.n?’<span style="margin-left:auto;background:#DC2626;color:white;font-size:10px;font-weight:800;padding:2px 7px;border-radius:20px">’+x.n+’</span>’:””)
+’</button>’).join(””)+’</nav>’
+’<div class="sb-bottom"><div class="sb-user"><div class="sb-avatar">👑</div><div><div class="sb-name">Admin</div><div class="sb-role">CasaYa</div></div></div>’
+’<button class="sb-logout" id="blo">Cerrar sesión</button></div>’
+’</aside>’
+’<main class="main">’+ pageHTML() +’</main>’
+’</div>’
+(S.selected?modalHTML():””)
+(S.toast?’<div class="toast">✅ ‘+S.toast.msg+’</div>’:””);
}

// ─ PAGES ─
function pageHTML(){
if(S.page===“dashboard”) return dashHTML();
if(S.page===“profesionales”) return prosHTML();
if(S.page===“verificacion”) return verifHTML();
return ‘<div class="page-title">Reservas</div><div class="page-sub">Próximamente</div><div class="table-wrap"><div class="empty-state"><div style="font-size:48px;margin-bottom:12px">📅</div><div style="font-size:15px;font-weight:600">Próximamente</div><div style="font-size:13px;margin-top:6px">Las reservas de clientes aparecerán aquí</div></div></div>’;
}

function dashHTML(){
const total=S.pros.length, act=S.pros.filter(p=>p.activo).length;
const ver=S.pros.filter(p=>p.verificado).length;
const pend=S.pros.filter(p=>p.foto_carnet_frente&&!p.verificado).length;
const cc={limpieza:0,cuidado:0,belleza:0};
S.pros.forEach(p=>{if(cc[p.categoria]!==undefined)cc[p.categoria]++;});
const rec=[…S.pros].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).slice(0,5);
return ‘<div class="page-title">Dashboard</div><div class="page-sub">Resumen general de CasaYa</div>’
+’<div class="stats-grid">’
+sc(“👥”,”#E0F7F4”,total,“Profesionales registrados”,“badge bg”,act+” activos”)
+sc(“✅”,”#EFF6FF”,ver,“Verificados”,pend?“badge by”:“badge bg”,pend?“⏳ “+pend+” pendientes”:“Al día”)
+sc(“🧹”,”#FFF8E1”,cc.limpieza,“Limpieza del hogar”,””,””)
+sc(“💅”,”#F3E8FF”,cc.belleza+cc.cuidado,“Belleza y Cuidado”,””,””)
+’</div>’
+’<div class="table-wrap"><div class="table-header"><div class="table-title">Últimos registros</div>’
+’<button class="btn btgr btn-sm" data-pg="profesionales">Ver todos →</button></div>’
+(rec.length===0?’<div class="empty-state"><div style="font-size:40px;margin-bottom:12px">👥</div><div style="font-size:15px;font-weight:600">Sin registros aún</div></div>’
:’<table><thead><tr><th>Profesional</th><th>Categoría</th><th>Ciudad</th><th>Estado</th><th>Fecha</th></tr></thead><tbody>’
+rec.map(p=>’<tr>’
+’<td><div class="td-name"><div class="td-avatar">’+(p.avatar_url?’<img src="'+p.avatar_url+'"/>’:ci(p.categoria))+’</div>’
+’<div><div class="td-main">’+p.nombre+’</div><div class="td-sub">’+p.whatsapp+’</div></div></div></td>’
+’<td><span class="badge '+cb(p.categoria)+'">’+cl(p.categoria)+’</span></td>’
+’<td>’+( p.ciudad||”—”)+’</td>’
+’<td>’+(p.verificado?’<span class="badge bg">✓ Verificado</span>’:p.foto_carnet_frente?’<span class="badge by">⏳ Pendiente</span>’:’<span class="badge bgr">Sin verificar</span>’)+’</td>’
+’<td style="color:#718096">’+fd(p.created_at)+’</td>’
+’</tr>’).join(””)
+’</tbody></table>’)
+’</div>’;
}

function sc(icon,bg,val,label,badgeClass,badgeText){
return ‘<div class="stat-card">’
+’<div class="stat-icon" style="background:'+bg+'">’+icon+’</div>’
+’<div class="stat-val">’+val+’</div>’
+’<div class="stat-label">’+label+’</div>’
+(badgeText?’<span class="'+badgeClass+'" style="display:inline-flex;align-items:center;font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;margin-top:8px">’+badgeText+’</span>’:””)
+’</div>’;
}

function prosHTML(){
let list=S.pros;
if(S.search){const q=S.search.toLowerCase();list=list.filter(p=>(p.nombre||””).toLowerCase().includes(q)||(p.ciudad||””).toLowerCase().includes(q)||(p.whatsapp||””).includes(q));}
if(S.filter!==“todos”) list=list.filter(p=>p.categoria===S.filter);
return ‘<div class="page-title">Profesionales</div><div class="page-sub">’+S.pros.length+’ registrados en total</div>’
+’<div class="table-wrap"><div class="table-header"><div class="table-title">Todos los profesionales</div>’
+’<div class="table-actions">’
+’<input class="search-inp" id="si" placeholder="🔍 Buscar nombre, ciudad..." value="'+S.search+'"/>’
+’<select class="filter-sel" id="fs">’
+’<option value=“todos”’+(S.filter===“todos”?” selected”:””)+’>Todas las categorías</option>’
+’<option value=“limpieza”’+(S.filter===“limpieza”?” selected”:””)+’>🧹 Limpieza</option>’
+’<option value=“cuidado”’+(S.filter===“cuidado”?” selected”:””)+’>💊 Cuidado</option>’
+’<option value=“belleza”’+(S.filter===“belleza”?” selected”:””)+’>💅 Belleza</option>’
+’</select>’
+’<button class="btn btgr btn-sm" id="brf">🔄 Actualizar</button>’
+’</div></div>’
+(S.loading?’<div class="loading-state">⏳ Cargando…</div>’
:list.length===0?’<div class="empty-state"><div style="font-size:40px;margin-bottom:12px">🔍</div><div style="font-size:15px;font-weight:600">Sin resultados</div></div>’
:’<table><thead><tr><th>Profesional</th><th>Categoría</th><th>Ciudad</th><th>Zonas</th><th>Verificación</th><th>Estado</th><th>Acciones</th></tr></thead><tbody>’
+list.map(p=>’<tr>’
+’<td><div class="td-name"><div class="td-avatar">’+(p.avatar_url?’<img src="'+p.avatar_url+'"/>’:ci(p.categoria))+’</div>’
+’<div><div class="td-main">’+p.nombre+’</div><div class="td-sub">’+p.whatsapp+’</div></div></div></td>’
+’<td><span class="badge '+cb(p.categoria)+'">’+cl(p.categoria)+’</span></td>’
+’<td>’+(p.ciudad||”—”)+’</td>’
+’<td style="color:#718096;font-size:12px">’+(p.zonas||”—”)+’</td>’
+’<td>’+(p.verificado?’<span class="badge bg">✓ Verificado</span>’:p.foto_carnet_frente?’<span class="badge by">⏳ Docs enviados</span>’:’<span class="badge bgr">Sin docs</span>’)+’</td>’
+’<td><span class=“badge ‘+(p.activo?“bg”:“br”)+’”>’+(p.activo?“Activo”:“Inactivo”)+’</span></td>’
+’<td><div style="display:flex;gap:6px">’
+’<button class="btn btgr btn-sm" data-a="view" data-id="'+p.id+'">👁 Ver</button>’
+(p.activo?’<button class="btn btr btn-sm" data-a="off" data-id="'+p.id+'">⛔</button>’
:’<button class="btn btg btn-sm" data-a="on" data-id="'+p.id+'">✅</button>’)
+(!p.verificado&&p.foto_carnet_frente?’<button class="btn bt btn-sm" data-a="ver" data-id="'+p.id+'">🔒 Verificar</button>’:””)
+’<button class="btn btr btn-sm" data-a="del" data-id="'+p.id+'">🗑</button>’
+’</div></td>’
+’</tr>’).join(””)
+’</tbody></table>’)
+’</div>’;
}

function verifHTML(){
const pend=S.pros.filter(p=>p.foto_carnet_frente&&!p.verificado);
const verf=S.pros.filter(p=>p.verificado);
const list=S.tab===“pendientes”?pend:verf;
return ‘<div class="page-title">Verificación de identidad</div><div class="page-sub">Revisa los documentos enviados</div>’
+’<div class="tabs">’
+’<button class=“tab’+(S.tab===“pendientes”?” active”:””)+’” data-tb=“pendientes”>⏳ Pendientes (’+pend.length+’)</button>’
+’<button class=“tab’+(S.tab===“verificados”?” active”:””)+’” data-tb=“verificados”>✅ Verificados (’+verf.length+’)</button>’
+’</div>’
+(list.length===0?’<div class="table-wrap"><div class="empty-state"><div style="font-size:48px;margin-bottom:12px">’+(S.tab===“pendientes”?“🎉”:“📋”)+’</div><div style="font-size:15px;font-weight:600">’+(S.tab===“pendientes”?”¡No hay pendientes!”:“Sin verificados aún”)+’</div></div></div>’
:list.map(p=>’<div class="table-wrap" style="margin-bottom:16px">’
+’<div style="padding:20px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #F0F4F8;flex-wrap:wrap;gap:12px">’
+’<div style="display:flex;align-items:center;gap:14px"><div class="td-avatar" style="width:48px;height:48px;border-radius:12px;font-size:22px">’+(p.avatar_url?’<img src="'+p.avatar_url+'" style="width:100%;height:100%;object-fit:cover"/>’:ci(p.categoria))+’</div>’
+’<div><div style="font-size:16px;font-weight:800;color:#1E2D4E">’+p.nombre+’</div><div style="font-size:13px;color:#718096">’+p.whatsapp+’ · ‘+(p.ciudad||”—”)+’</div></div></div>’
+’<div style="display:flex;gap:10px">’
+(!p.verificado?’<button class="btn bt" data-a="ver" data-id="'+p.id+'">✅ Aprobar verificación</button>’:’<span class="badge bg" style="font-size:13px;padding:8px 14px">✓ Verificado</span>’)
+’<button class="btn btgr" data-a="view" data-id="'+p.id+'">👁 Ver perfil</button>’
+’</div></div>’
+’<div style="padding:20px 24px"><div style="font-size:12px;font-weight:700;color:#718096;text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px">Documentos enviados</div>’
+’<div class="photo-grid">’
+[‘frente’,‘reverso’,‘selfie’].map((k,i)=>{const url=[p.foto_carnet_frente,p.foto_carnet_reverso,p.foto_selfie_carnet][i];const lbl=[“Carnet frente”,“Carnet reverso”,“Selfie con carnet”][i];const ico=i<2?“🪪”:“🤳”;return’<div><div class="photo-item">’+(url?’<img src="'+url+'"/>’:”<span style='font-size:32px;color:#CBD5E0'>”+ico+”</span>”)+’</div><div class="photo-label">’+lbl+’</div></div>’;}).join(””)
+’</div>’
+(p.direccion_domicilio?’<div style="margin-top:14px;background:#F8FAFC;border-radius:10px;padding:12px 14px;font-size:13px;color:#4A5568"><strong>📍 Dirección:</strong> ‘+p.direccion_domicilio+’</div>’:””)
+’</div></div>’).join(””));
}

function modalHTML(){
const p=S.selected; if(!p) return “”;
const svcs=p.servicios||[];
return ‘<div class="modal-bg" id="mbg">’
+’<div class="modal"><div class="modal-head"><h2>’+p.nombre+’</h2><button class="btn btgr btn-sm" id="bcm">✕ Cerrar</button></div>’
+’<div class="modal-body">’
+’<div class="msec"><div class="msec-title">Información personal</div><div class="modal-grid">’
+dr(“Nombre”,p.nombre)+dr(“WhatsApp”,’<a href=“https://wa.me/’+(p.whatsapp||””).replace(/\D/g,””)+’” target=”_blank” style=“color:#00BFA5;font-weight:700”>’+p.whatsapp+’</a>’)
+dr(“Ciudad”,p.ciudad||”—”)+dr(“Zonas”,p.zonas||”—”)
+dr(“Categoría”,cl(p.categoria))+dr(“Experiencia”,p.experiencia||”—”)
+dr(“Estado”,’<span class=“badge ‘+(p.activo?“bg”:“br”)+’”>’+(p.activo?“Activo”:“Inactivo”)+’</span>’)
+dr(“Verificado”,’<span class=“badge ‘+(p.verificado?“bg”:“by”)+’”>’+(p.verificado?“✓ Sí”:“⏳ No”)+’</span>’)
+(p.bio?’<div class="dr" style="grid-column:1/-1">’+dr(“Sobre mí”,p.bio)+’</div>’:””)
+dr(“Registrado”,fd(p.created_at))
+’</div></div>’
+(p.avatar_url?’<div class="msec"><div class="msec-title">Foto de perfil</div><img src="'+p.avatar_url+'" style="width:100px;height:100px;border-radius:50%;object-fit:cover;border:3px solid #00BFA5"/></div>’:””)
+(svcs.length?’<div class="msec"><div class="msec-title">Servicios y precios</div><table class="st"><thead><tr><th>Servicio</th><th>Precio</th><th>Duración</th><th>Descripción</th></tr></thead><tbody>’
+svcs.map(s=>’<tr><td style="font-weight:600">’+(s.name||”—”)+’</td><td style="color:#00BFA5;font-weight:700">’+(s.price?s.price+” CUP”:”—”)+’</td><td>’+(s.duration||”—”)+’</td><td style="color:#718096">’+(s.description||s.desc||”—”)+’</td></tr>’).join(””)
+’</tbody></table></div>’:””)
+(p.foto_carnet_frente||p.foto_carnet_reverso||p.foto_selfie_carnet?
‘<div class="msec"><div class="msec-title">Documentos de verificación</div><div class="photo-grid">’
+[‘frente’,‘reverso’,‘selfie’].map((k,i)=>{const url=[p.foto_carnet_frente,p.foto_carnet_reverso,p.foto_selfie_carnet][i];const lbl=[“Carnet frente”,“Carnet reverso”,“Selfie con carnet”][i];const ico=i<2?“🪪”:“🤳”;return’<div><div class="photo-item">’+(url?’<img src="'+url+'"/>’:”<span style='font-size:32px;color:#CBD5E0'>”+ico+”</span>”)+’</div><div class="photo-label">’+lbl+’</div></div>’;}).join(””)
+’</div>’
+(p.direccion_domicilio?’<div style="margin-top:14px;background:#F8FAFC;border-radius:10px;padding:12px 14px;font-size:13px"><strong>📍 Dirección domicilio:</strong> ‘+p.direccion_domicilio+’</div>’:””)
+’</div>’:””)
+’<div style="display:flex;gap:10px;flex-wrap:wrap;padding-top:8px;border-top:1px solid #F0F4F8">’
+(!p.verificado&&p.foto_carnet_frente?’<button class="btn bt" data-a="ver" data-id="'+p.id+'">✅ Aprobar verificación</button>’:””)
+(p.activo?’<button class="btn btr" data-a="off" data-id="'+p.id+'">⛔ Desactivar</button>’:’<button class="btn btg" data-a="on" data-id="'+p.id+'">✅ Activar</button>’)
+’<a href=“https://wa.me/’+(p.whatsapp||””).replace(/\D/g,””)+’” target=”_blank” class=“btn btgr”>💬 WhatsApp</a>’
+’<button class="btn btr" style="margin-left:auto" data-a="del" data-id="'+p.id+'">🗑 Eliminar</button>’
+’</div></div></div></div>’;
}

function dr(k,v){ return ‘<div class="dr"><span class="dk">’+k+’</span><span class="dv">’+v+’</span></div>’; }
function ci(cat){ return {limpieza:“🧹”,cuidado:“👩‍⚕️”,belleza:“💅”}[cat]||“👤”; }
function cl(cat){ return {limpieza:“Limpieza”,cuidado:“Cuidado”,belleza:“Belleza”}[cat]||cat||”—”; }
function cb(cat){ return {limpieza:“bb”,cuidado:“by”,belleza:“bg”}[cat]||“bgr”; }
function fd(d){ if(!d) return “—”; return new Date(d).toLocaleDateString(“es-ES”,{day:“2-digit”,month:“short”,year:“numeric”}); }

async function loadPros(){
S.loading=true; r();
const{data,error}=await sb.from(“profesionales”).select(”*”).order(“created_at”,{ascending:false});
if(!error&&data) S.pros=data;
S.loading=false; r();
}

async function verifyPro(id){
if(!confirm(“Verificar este profesional?”)) return;
const{error}=await sb.from(“profesionales”).update({verificado:true}).eq(“id”,id);
if(!error){S.pros=S.pros.map(p=>p.id===id?{…p,verificado:true}:p);if(S.selected?.id===id)S.selected={…S.selected,verificado:true};toast(“Profesional verificado”);}
r();
}

async function toggleActive(id,act){
const{error}=await sb.from(“profesionales”).update({activo:act}).eq(“id”,id);
if(!error){S.pros=S.pros.map(p=>p.id===id?{…p,activo:act}:p);if(S.selected?.id===id)S.selected={…S.selected,activo:act};toast(act?“Perfil activado”:“Perfil desactivado”);}
r();
}

async function deletePro(id){
if(!confirm(“Eliminar este profesional? No se puede deshacer.”)) return;
const{error}=await sb.from(“profesionales”).delete().eq(“id”,id);
if(!error){S.pros=S.pros.filter(p=>p.id!==id);S.selected=null;toast(“Profesional eliminado”);}
r();
}

function bind(){
// Login
const bl=document.getElementById(“bl”);
if(bl){
bl.addEventListener(“click”,()=>{const p=document.getElementById(“pi”)?.value;if(p===ADMIN_PASS){S.logged=true;S.loginErr=false;loadPros();}else{S.loginErr=true;r();}});
document.getElementById(“pi”)?.addEventListener(“keydown”,e=>{if(e.key===“Enter”)bl.click();});
}
// Logout
document.getElementById(“blo”)?.addEventListener(“click”,()=>{S.logged=false;S.pros=[];r();});
// Nav pages
document.querySelectorAll(”[data-pg]”).forEach(el=>el.addEventListener(“click”,()=>{S.page=el.getAttribute(“data-pg”);S.selected=null;r();}));
// Tabs
document.querySelectorAll(”[data-tb]”).forEach(el=>el.addEventListener(“click”,()=>{S.tab=el.getAttribute(“data-tb”);r();}));
// Search / Filter
document.getElementById(“si”)?.addEventListener(“input”,e=>{S.search=e.target.value;r();});
document.getElementById(“fs”)?.addEventListener(“change”,e=>{S.filter=e.target.value;r();});
// Refresh
document.getElementById(“brf”)?.addEventListener(“click”,loadPros);
// Modal
document.getElementById(“bcm”)?.addEventListener(“click”,()=>{S.selected=null;r();});
document.getElementById(“mbg”)?.addEventListener(“click”,e=>{if(e.target.id===“mbg”){S.selected=null;r();}});
// Actions
document.querySelectorAll(”[data-a]”).forEach(el=>{
el.addEventListener(“click”,e=>{
e.stopPropagation();
const a=el.getAttribute(“data-a”),id=el.getAttribute(“data-id”);
if(a===“view”){S.selected=S.pros.find(p=>p.id===id)||null;r();}
else if(a===“ver”) verifyPro(id);
else if(a===“on”)  toggleActive(id,true);
else if(a===“off”) toggleActive(id,false);
else if(a===“del”) deletePro(id);
});
});
}

r();
</script>

</body>
</html>
