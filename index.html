<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>CasaYa — Servicios a domicilio en Cuba</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>

<!-- React + Babel + Supabase via CDN -->

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{font-family:'Plus Jakarta Sans',sans-serif;background:#F7F9FC;overflow-x:hidden}
#root{max-width:430px;margin:0 auto;min-height:100vh;position:relative}
input,textarea,select,button{font-family:'Plus Jakarta Sans',sans-serif}
::-webkit-scrollbar{display:none}
</style>

</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── CONSTANTS ────────────────────────────────────────────────
const TEAL = "#00BFA5";
const TEAL_D = "#009688";
const TEAL_L = "#E0F7F4";
const NAVY = "#1E2D4E";
const NAVY2 = "#2C3E6B";
const G5 = "#718096";
const G3 = "#CBD5E0";
const G1 = "#F7F9FC";

const CITIES = [
  ["Pinar del Río"],["Artemisa"],["La Habana"],["Mayabeque"],
  ["Matanzas"],["Cienfuegos"],["Villa Clara"],["Sancti Spíritus"],
  ["Ciego de Ávila"],["Camagüey"],["Las Tunas"],["Holguín"],
  ["Granma"],["Santiago de Cuba"],["Guantánamo"],["Isla de la Juventud"],
];
const CAT_E = {limpieza:"🧹",cuidado:"👩‍⚕️",belleza:"💅"};
const CAT_B = {limpieza:"#E0F7F4",cuidado:"#FFF0E3",belleza:"#F3E8FF"};
const DAYS   = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
const MONTHS = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
const TIMES  = ["8:00 AM","9:00 AM","10:00 AM","11:00 AM","2:00 PM","4:00 PM"];

const TUT_DATA = [
  {icon:"🏠",title:"Busca tu servicio a domicilio",sub:"Limpieza, cuidado de personas, belleza y más. Todo a domicilio en Cuba."},
  {icon:"⭐",title:"Escoge a tu profesional ideal",sub:"Compara profesionales, sus precios y valoraciones. Elige el que más te guste."},
  {icon:"💬",title:"Contáctalo en 3 toques",sub:"Reserva en la app o escríbele por WhatsApp. Pago en efectivo, sin comisiones."},
  {icon:"🎉",title:"Disfruta tu servicio",sub:"Recibe al profesional en tu domicilio. ¡Y califica tu experiencia!"},
];

// ── STYLE HELPERS ────────────────────────────────────────────
const btn = (extra={}) => ({
  width:"100%", background:TEAL, border:"none", borderRadius:14,
  padding:15, fontSize:15, fontWeight:800, color:"white",
  cursor:"pointer", display:"block", ...extra
});
const inp = {
  background:"white", border:"1.5px solid #E2E8F0", borderRadius:12,
  padding:"13px 16px", fontSize:14, color:NAVY, outline:"none", width:"100%"
};
const sel = {...inp, cursor:"pointer"};
const card = (extra={}) => ({
  background:"white", borderRadius:16,
  boxShadow:"0 4px 20px rgba(0,0,0,.07)", ...extra
});
const navH = {
  background:"white", borderBottom:"1px solid #EDF2F7",
  padding:"0 20px", height:60, display:"flex",
  alignItems:"center", justifyContent:"space-between",
  position:"sticky", top:0, zIndex:100
};
const hero = {
  background:`linear-gradient(145deg,${NAVY},${NAVY2})`,
  padding:"28px 20px 32px", position:"relative", overflow:"hidden"
};
const regH = {
  background:`linear-gradient(145deg,${NAVY},${NAVY2})`,
  padding:"20px 20px 24px"
};
const fab = {
  position:"fixed", bottom:18, left:"50%",
  transform:"translateX(-50%)",
  width:54, height:54, borderRadius:"50%",
  background:TEAL, border:"none", cursor:"pointer",
  display:"flex", alignItems:"center", justifyContent:"center",
  boxShadow:"0 4px 20px rgba(0,191,165,.4)", zIndex:110
};
const bnav = {
  position:"fixed", bottom:0, left:"50%",
  transform:"translateX(-50%)", width:"100%", maxWidth:430,
  background:"white", borderTop:"1px solid #EDF2F7",
  display:"flex", justifyContent:"space-around",
  padding:"8px 0 14px", zIndex:100
};
const ib = {
  background:TEAL_L, borderRadius:12, padding:14,
  display:"flex", gap:10, alignItems:"flex-start",
  fontSize:12, color:TEAL_D, fontWeight:500, lineHeight:1.5
};
const vb = type => {
  const m={ok:[TEAL_L,TEAL_D],pend:["#FFF8E1","#D97706"],no:["#FEE2E2","#DC2626"]};
  return {display:"inline-flex",alignItems:"center",gap:4,borderRadius:20,
    fontSize:11,fontWeight:700,padding:"4px 10px",background:m[type][0],color:m[type][1]};
};
const screen = {minHeight:"100vh",display:"flex",flexDirection:"column",background:"white"};

// ── SMALL COMPONENTS ─────────────────────────────────────────
function Logo({onClick}){
  return <div onClick={onClick} style={{fontSize:22,fontWeight:800,color:NAVY,letterSpacing:-.5,cursor:"pointer"}}>
    Casa<span style={{color:TEAL}}>Ya</span>
  </div>;
}
function BackW({onClick}){
  return <button onClick={onClick} style={{width:36,height:36,background:"rgba(255,255,255,.15)",border:"none",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}}>
    <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="white" strokeWidth="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
  </button>;
}
function BackD({onClick}){
  return <button onClick={onClick} style={{width:36,height:36,background:G1,border:"none",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}}>
    <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke={G5} strokeWidth="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
  </button>;
}
function CityOptions(){
  return CITIES.map(([c])=><option key={c}>{c}</option>);
}
function BNav({cur,onChange}){
  const items=[
    {id:"home",label:"Inicio",icon:<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" width="22" height="22"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>},
    {id:"explore",label:"Explorar",icon:<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" width="22" height="22"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>},
    {id:"_fab",label:"",icon:null},
    {id:"bookings",label:"Reservas",icon:<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" width="22" height="22"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>},
    {id:"profile",label:"Perfil",icon:<svg fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2" width="22" height="22"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>},
  ];
  return <nav style={bnav}>
    {items.map(it => it.id==="_fab"
      ? <div key="_fab" style={{width:60}}/>
      : <button key={it.id} onClick={()=>onChange(it.id)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3,cursor:"pointer",padding:"4px 14px",border:"none",background:"none",color:cur===it.id?TEAL:G5,fontSize:10,fontWeight:600}}>
          {it.icon}<span>{it.label}</span>
        </button>
    )}
  </nav>;
}
function ProCard({pro,onClick}){
  return <div onClick={onClick} style={{...card(),padding:16,display:"flex",gap:14,cursor:"pointer"}}>
    <div style={{width:64,height:64,borderRadius:14,background:CAT_B[pro.category]||"#F0F4F8",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,flexShrink:0,overflow:"hidden"}}>
      {pro.avatar?<img src={pro.avatar} style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:14}}/>:<span>{CAT_E[pro.category]||"👤"}</span>}
    </div>
    <div style={{flex:1}}>
      <div style={{fontSize:15,fontWeight:700,color:NAVY}}>{pro.name}</div>
      <div style={{fontSize:12,color:G5,marginTop:2}}>{pro.role}</div>
      <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>
        <span style={{background:G1,color:G5,fontSize:10,fontWeight:600,padding:"3px 8px",borderRadius:6}}>📍 {pro.city}</span>
        {pro.verified&&<span style={{background:TEAL_L,color:TEAL_D,fontSize:10,fontWeight:600,padding:"3px 8px",borderRadius:6}}>✓ Verificado</span>}
        <span style={{background:G1,color:G5,fontSize:10,fontWeight:600,padding:"3px 8px",borderRadius:6}}>Efectivo</span>
      </div>
    </div>
  </div>;
}
function Empty({withBtn,onReg}){
  return <div style={{...card(),display:"flex",flexDirection:"column",alignItems:"center",padding:"40px 24px",textAlign:"center",gap:12}}>
    <div style={{fontSize:48}}>🔍</div>
    <div style={{fontSize:16,fontWeight:800,color:NAVY}}>Sin profesionales aún</div>
    <div style={{fontSize:13,color:G5,lineHeight:1.6,maxWidth:260}}>Todavía no hay profesionales. ¡Sé el primero!</div>
    {withBtn&&<button style={btn({maxWidth:240,marginTop:10})} onClick={onReg}>Registrarme como profesional</button>}
  </div>;
}

// ── TUTORIAL ─────────────────────────────────────────────────
function Tutorial({onDone}){
  const [i,setI]=useState(0);
  const d=TUT_DATA[i];
  return <div style={{...screen,background:"white"}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"20px 24px 0"}}>
      <Logo onClick={onDone}/>
      <button onClick={onDone} style={{fontSize:15,fontWeight:700,color:TEAL,background:"none",border:"none",cursor:"pointer"}}>Salir</button>
    </div>
    <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"20px 32px"}}>
      <div style={{width:200,height:200,borderRadius:"50%",background:TEAL_L,display:"flex",alignItems:"center",justifyContent:"center",fontSize:90,marginBottom:20}}>{d.icon}</div>
      <h2 style={{fontSize:26,fontWeight:800,color:NAVY,textAlign:"center",lineHeight:1.3,marginBottom:10}}>{d.title}</h2>
      <p style={{fontSize:15,color:G5,textAlign:"center",lineHeight:1.6}}>{d.sub}</p>
    </div>
    <div style={{display:"flex",justifyContent:"center",gap:8,padding:"20px 0 10px"}}>
      {TUT_DATA.map((_,j)=><div key={j} style={{width:j===i?24:8,height:8,borderRadius:j===i?4:"50%",background:j===i?TEAL:G3,transition:"all .25s"}}/>)}
    </div>
    <div style={{padding:"16px 24px 36px"}}>
      <button style={btn()} onClick={()=>i>=3?onDone():setI(i+1)}>{i===3?"¡Empezar!":"Siguiente"}</button>
    </div>
  </div>;
}

// ── ONBOARDING ───────────────────────────────────────────────
function Onboarding({onClient,onPro}){
  const [role,setRole]=useState("");
  const go=()=>{
    if(!role){alert("Por favor elige una opción.");return;}
    role==="client"?onClient():onPro();
  };
  const rc=(id)=>({
    background:"white",
    border:`2px solid ${role===id?TEAL:"#E2E8F0"}`,
    borderRadius:20,padding:20,display:"flex",alignItems:"center",
    gap:16,cursor:"pointer",
    boxShadow:"0 4px 20px rgba(0,0,0,.07)",marginBottom:14
  });
  return <div style={screen}>
    <div style={{background:`linear-gradient(150deg,${NAVY},${NAVY2})`,padding:"52px 28px 36px",textAlign:"center"}}>
      <div style={{fontSize:34,fontWeight:800,color:"white",letterSpacing:-1,marginBottom:6}}>Casa<span style={{color:TEAL}}>Ya</span></div>
      <div style={{fontSize:14,color:"rgba(255,255,255,.45)"}}>Servicios a domicilio en Cuba 🇨🇺</div>
    </div>
    <div style={{flex:1,padding:"32px 24px"}}>
      <h2 style={{fontSize:22,fontWeight:800,color:NAVY,marginBottom:8}}>¿Cómo quieres usar CasaYa?</h2>
      <p style={{fontSize:14,color:G5,marginBottom:28,lineHeight:1.6}}>Elige tu rol para personalizar tu experiencia.</p>
      <div style={rc("client")} onClick={()=>setRole("client")}>
        <div style={{width:54,height:54,borderRadius:16,background:"#E0F7F4",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,flexShrink:0}}>🏠</div>
        <div><div style={{fontSize:16,fontWeight:800,color:NAVY}}>Buscar servicios</div><div style={{fontSize:12,color:G5,marginTop:3}}>Necesito un profesional a domicilio</div></div>
      </div>
      <div style={rc("pro")} onClick={()=>setRole("pro")}>
        <div style={{width:54,height:54,borderRadius:16,background:"#EEF2FF",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,flexShrink:0}}>💼</div>
        <div><div style={{fontSize:16,fontWeight:800,color:NAVY}}>Ofrecer mis servicios</div><div style={{fontSize:12,color:G5,marginTop:3}}>Soy profesional y quiero clientes</div></div>
      </div>
    </div>
    <div style={{padding:"20px 24px 36px"}}>
      <button style={btn()} onClick={go}>Continuar →</button>
    </div>
  </div>;
}

// ── REG CLIENT ───────────────────────────────────────────────
function RegClient({onBack,onDone}){
  return <div style={screen}>
    <div style={regH}>
      <BackW onClick={onBack}/>
      <div style={{fontSize:20,fontWeight:800,color:"white",marginTop:8}}>Crear cuenta</div>
      <div style={{fontSize:13,color:"rgba(255,255,255,.5)",marginTop:3}}>Para buscar y reservar servicios</div>
    </div>
    <div style={{flex:1,overflowY:"auto",paddingBottom:100}}>
      <div style={{padding:"24px 20px",display:"flex",flexDirection:"column",gap:18}}>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          <label style={{fontSize:13,fontWeight:700,color:G5}}>Nombre completo</label>
          <input style={inp} type="text" placeholder="Ej: Ana García López"/>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          <label style={{fontSize:13,fontWeight:700,color:G5}}>WhatsApp ✱</label>
          <input style={inp} type="tel" placeholder="+53 5 XXX XXXX"/>
          <span style={{fontSize:11,color:G5}}>✱ Los profesionales te contactarán aquí</span>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          <label style={{fontSize:13,fontWeight:700,color:G5}}>Ciudad</label>
          <select style={sel}><option value="">— Selecciona —</option><CityOptions/></select>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          <label style={{fontSize:13,fontWeight:700,color:G5}}>Municipio / Reparto</label>
          <input style={inp} type="text" placeholder="Ej: Playa, Vedado"/>
        </div>
        <div style={ib}><span>💡</span><span>Tu WhatsApp permite que los profesionales se coordinen contigo directamente.</span></div>
      </div>
    </div>
    <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"white",padding:"14px 20px 28px",borderTop:"1px solid #EDF2F7"}}>
      <button style={btn()} onClick={onDone}>Crear cuenta y explorar →</button>
    </div>
  </div>;
}

// ── REG PRO ──────────────────────────────────────────────────
function RegPro({onBack,onDone}){
  const [step,setStep]=useState(1);
  
  const [avSrc,setAvSrc]=useState(null);
  const [ups,setUps]=useState({});
  const avRef=useRef();
  const [formData,setFormData]=useState({nombre:"",whatsapp:"",ciudad:"",zonas:"",bio:"",categoria:"",experiencia:"",disponibilidad:[],direccion:""});
  const [formSvcs,setFormSvcs]=useState([{name:"",price:"",duration:"1h",desc:""}]);
  const [verifFiles,setVerifFiles]=useState({front:null,back:null,self:null});
  const [saving,setSaving]=useState(false);
  const T2=["Datos personales","Servicios y precios","Verificación","¡Listo!"];
  const T3=["Paso 1 de 4","Paso 2 de 4","Paso 3 de 4","Paso 4 de 4"];
  const goNext=async()=>{
    if(step===4){
      setSaving(true);
      // Save to Supabase
      try {
        const sb = window.supabase.createClient(
          "https://olfbnucblnzijfuytjgs.supabase.co",
          "sb_publishable_SOOuRm-nwNBJlX-7GkH4Cg_cEAZ6wIx"
        );
        // Upload avatar if exists
        let avatarUrl = null;
        if(avSrc && avRef.current?.files[0]) {
          const file = avRef.current.files[0];
          const fileName = `avatar_${Date.now()}_${file.name}`;
          const { data: uploadData } = await sb.storage
            .from("avatares")
            .upload(fileName, file, { upsert: true });
          if(uploadData) {
            const { data: urlData } = sb.storage.from("avatares").getPublicUrl(fileName);
            avatarUrl = urlData?.publicUrl;
          }
        }
        // Upload verification photos
        const uploadVerif = async (file, prefix) => {
          if(!file) return null;
          const name = `${prefix}_${Date.now()}`;
          const { data } = await sb.storage.from("verificacion").upload(name, file, { upsert: true });
          if(data) {
            const { data: u } = sb.storage.from("verificacion").getPublicUrl(name);
            return u?.publicUrl;
          }
          return null;
        };
        const frontUrl  = verifFiles.front  ? await uploadVerif(verifFiles.front,  "front")  : null;
        const backUrl   = verifFiles.back   ? await uploadVerif(verifFiles.back,   "back")   : null;
        const selfieUrl = verifFiles.self   ? await uploadVerif(verifFiles.self,   "selfie") : null;

        // Parse services from state
        const svcsData = formSvcs.map(s => ({
          name: s.name, price: s.price, duration: s.duration, description: s.desc
        })).filter(s => s.name);

        const catLabels = {limpieza:"Limpieza del hogar", cuidado:"Cuidado de personas mayores", belleza:"Belleza y estética"};

        const payload = {
          nombre:          formData.nombre,
          whatsapp:        formData.whatsapp,
          ciudad:          formData.ciudad,
          zonas:           formData.zonas,
          bio:             formData.bio,
          categoria:       formData.categoria,
          categoria_label: catLabels[formData.categoria] || formData.categoria,
          experiencia:     formData.experiencia,
          disponibilidad:  formData.disponibilidad,
          servicios:       svcsData,
          avatar_url:      avatarUrl,
          verificado:      false,
          activo:          true,
          foto_carnet_frente:  frontUrl,
          foto_carnet_reverso: backUrl,
          foto_selfie_carnet:  selfieUrl,
          direccion_domicilio: formData.direccion,
        };
        const { error } = await sb.from("profesionales").insert([payload]);
        if(error) { console.error("Error guardando:", error); }
      } catch(e) { console.error("Error Supabase:", e); }
      setSaving(false);
      onDone();
      return;
    }
    setStep(s=>s+1);
  };
  const goBack=()=>step>1?setStep(s=>s-1):onBack();
  const handleAv=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setAvSrc(ev.target.result);r.readAsDataURL(f);};
  const handleUp=k=>e=>{
    if(e.target.files&&e.target.files[0]){
      setUps(u=>({...u,[k]:true}));
      setVerifFiles(v=>({...v,[k]:e.target.files[0]}));
    }
  };
  const anyPh=ups.front||ups.back||ups.self;

  return <div style={screen}>
    <div style={regH}>
      <BackW onClick={goBack}/>
      <div style={{fontSize:20,fontWeight:800,color:"white",marginTop:8}}>{T2[step-1]}</div>
      <div style={{fontSize:13,color:"rgba(255,255,255,.5)",marginTop:3}}>{T3[step-1]}</div>
    </div>
    <div style={{display:"flex",gap:6,padding:"14px 20px 0"}}>
      {[1,2,3,4].map(i=><div key={i} style={{height:4,borderRadius:4,flex:1,background:i<=step?TEAL:"#E2E8F0",transition:"background .3s"}}/>)}
    </div>
    <div style={{flex:1,overflowY:"auto",paddingBottom:100}}>
      <div style={{padding:"24px 20px",display:"flex",flexDirection:"column",gap:18}}>

        {step===1&&<>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:8,padding:"8px 0"}}>
            <input type="file" accept="image/*" ref={avRef} style={{display:"none"}} onChange={handleAv}/>
            <div onClick={()=>avRef.current.click()} style={{width:100,height:100,borderRadius:"50%",background:G1,border:avSrc?`3px solid ${TEAL}`:"3px dashed "+G3,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",overflow:"hidden"}}>
              {avSrc?<img src={avSrc} style={{width:"100%",height:"100%",objectFit:"cover",borderRadius:"50%"}}/>:<><span style={{fontSize:28}}>📷</span><span style={{fontSize:10,fontWeight:700,color:G5}}>Tu foto</span></>}
            </div>
            <span style={{fontSize:12,color:G5}}>Foto de perfil (recomendado)</span>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}><label style={{fontSize:13,fontWeight:700,color:G5}}>Nombre completo</label><input style={inp} type="text" placeholder="Ej: María González" value={formData.nombre} onChange={e=>setFormData(f=>({...f,nombre:e.target.value}))}/></div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}><label style={{fontSize:13,fontWeight:700,color:G5}}>WhatsApp ✱</label><input style={inp} type="tel" placeholder="+53 5 XXX XXXX" value={formData.whatsapp} onChange={e=>setFormData(f=>({...f,whatsapp:e.target.value}))}/><span style={{fontSize:11,color:G5}}>✱ Los clientes te contactarán por aquí</span></div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}><label style={{fontSize:13,fontWeight:700,color:G5}}>Ciudad</label><select style={sel} value={formData.ciudad} onChange={e=>setFormData(f=>({...f,ciudad:e.target.value}))}><option value="">— Selecciona —</option><CityOptions/></select></div>

          </div>
        </>}

        {step===4&&<>
          <div style={{textAlign:"center",padding:"20px 0 10px"}}>
            <div style={{fontSize:56,marginBottom:16}}>🎉</div>
            <h2 style={{fontSize:22,fontWeight:800,color:NAVY,marginBottom:8}}>¡Perfil creado!</h2>

          </div>
          <div style={{background:G1,borderRadius:16,padding:16}}>

              <div key={k} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:i<arr.length-1?"1px solid #E8EBF0":"none"}}>

              </div>
            ))}
          </div>
          <div style={ib}><span>📱</span><span>Los clientes te contactarán por WhatsApp. Mantén notificaciones activas.</span></div>
        </>}

      </div>
    </div>
    <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"white",padding:"14px 20px 28px",borderTop:"1px solid #EDF2F7"}}>
      <button style={btn({opacity:saving?0.6:1,pointerEvents:saving?"none":"auto"})} onClick={goNext}>
        {saving?"Guardando..." : step===4?"Ir a la app →":"Continuar →"}
      </button>
    </div>
  </div>;
}

// ── EXPLORE ──────────────────────────────────────────────────
function Explore({pros,onNav,onDetail,onFab}){
  const [filter,setFilter]=useState("todos");
  const [q,setQ]=useState("");
  const filtered=pros.filter(p=>{
    const mc=filter==="todos"||p.category===filter;
    const mq=!q||p.name.toLowerCase().includes(q.toLowerCase())||p.role.toLowerCase().includes(q.toLowerCase());
    return mc&&mq;
  });
  return <div style={screen}>
    <div style={navH}><Logo onClick={()=>onNav("home")}/></div>
    <div style={{background:"white",padding:"14px 20px",borderBottom:"1px solid #EDF2F7"}}>
      <div style={{background:G1,borderRadius:12,display:"flex",alignItems:"center",padding:"0 14px",gap:10,height:46}}>
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="#9CA3AF" strokeWidth="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" value={q} onChange={e=>setQ(e.target.value)} placeholder="Buscar profesional o servicio..." style={{flex:1,border:"none",outline:"none",fontSize:14,background:"transparent"}}/>
      </div>
    </div>
    <div style={{display:"flex",gap:8,padding:"14px 20px",overflowX:"auto",background:"white",borderBottom:"1px solid #F0F4F8",scrollbarWidth:"none"}}>
      {[["todos","Todos"],["limpieza","🧹 Limpieza"],["cuidado","💊 Cuidado"],["belleza","💅 Belleza"]].map(([id,label])=>(
        <button key={id} onClick={()=>setFilter(id)} style={{whiteSpace:"nowrap",padding:"6px 14px",borderRadius:20,fontSize:12,fontWeight:600,cursor:"pointer",border:filter===id?`1.5px solid ${TEAL}`:"1.5px solid #E2E8F0",background:filter===id?TEAL:"white",color:filter===id?"white":"#4A5568"}}>{label}</button>
      ))}
    </div>
    <div style={{flex:1,overflowY:"auto",paddingBottom:80}}>
      <div style={{padding:"16px 20px",display:"flex",flexDirection:"column",gap:12}}>
        {filtered.length===0
          ? <Empty withBtn onReg={()=>onNav("regpro")}/>
          : filtered.map((p,i)=><ProCard key={i} pro={p} onClick={()=>onDetail(p)}/>)
        }
      </div>
    </div>
    <BNav cur="explore" onChange={onNav}/>
    <button style={fab} onClick={onFab}>
      <svg width="26" height="26" fill="none" viewBox="0 0 24 24" stroke="white" strokeWidth="2.5"><path d="M12 5v14M5 12h14"/></svg>
    </button>
  </div>;
}

    window.open(`https://wa.me/${n}?text=${m}`,"_blank");
  };
  return <div style={screen}>
    <div style={{flex:1,overflowY:"auto",paddingBottom:90}}>

            <div style={{display:"flex",gap:20,marginTop:12}}>

              <div><div style={{fontSize:16,fontWeight:800,color:"white"}}>0</div><div style={{fontSize:10,color:"rgba(255,255,255,.45)",marginTop:2}}>Reseñas</div></div>

          <div style={{fontSize:14,fontWeight:800,marginBottom:12,color:NAVY}}>Servicios y precios</div>

            </div>)}

        </div>}
        <div style={ib}><span>💬</span><span>Escríbele por WhatsApp para coordinar antes de reservar.</span></div>

// ── APP ROOT ─────────────────────────────────────────────────
function App(){
  const [screen,setScreen]=useState("tutorial");
  const [pros,setPros]=useState([]);
  const [prosLoading,setProsLoading]=useState(false);
  const [city,setCity]=useState("");
  const [pro,setPro]=useState(null);
  const [bookings,setBookings]=useState([]);
  const [modal,setModal]=useState(false);
  const [rating,setRating]=useState(false);
  const timer=useRef();

  const loadPros = async () => {
    setProsLoading(true);
    try {
      const sb = window.supabase.createClient(
        "https://olfbnucblnzijfuytjgs.supabase.co",
        "sb_publishable_SOOuRm-nwNBJlX-7GkH4Cg_cEAZ6wIx"
      );
      const { data, error } = await sb
        .from("profesionales")
        .select("*")
        .eq("activo", true)
        .order("created_at", { ascending: false });
      if (!error && data) {
        const mapped = data.map(p => ({
          id: p.id,
          name: p.nombre,
          role: p.categoria_label || p.categoria,
          category: p.categoria,
          city: p.ciudad,
          zones: p.zonas,
          bio: p.bio,
          whatsapp: p.whatsapp,
          avatar: p.avatar_url,
          verified: p.verificado,
          services: p.servicios || [],
        }));
        setPros(mapped);
      }
    } catch(e) { console.error("Error cargando profesionales:", e); }
    setProsLoading(false);
  };

  const startApp=()=>{
    setScreen("home");
    loadPros();
    timer.current=setTimeout(()=>setRating(true),60000);
  };
  useEffect(()=>()=>clearTimeout(timer.current),[]);

  const nav=(dest,p=null)=>{
    if(dest==="detail"&&p){setPro(p);setScreen("detail");return;}
    setScreen(dest);
  };

  return <div style={{maxWidth:430,margin:"0 auto",minHeight:"100vh",position:"relative",fontFamily:"'Plus Jakarta Sans',sans-serif"}}>
    {screen==="tutorial"  && <Tutorial onDone={()=>setScreen("onboarding")}/>}
    {screen==="onboarding"&& <Onboarding onClient={()=>setScreen("regclient")} onPro={()=>setScreen("regpro")}/>}
    {screen==="regclient" && <RegClient onBack={()=>setScreen("onboarding")} onDone={startApp}/>}
    {screen==="regpro"    && <RegPro onBack={()=>setScreen("onboarding")} onDone={startApp}/>}
    {screen==="home"      && <Home pros={pros} prosLoading={prosLoading} onNav={nav} onCat={cat=>{setScreen("explore");}} city={city} onCity={setCity} onFab={()=>setModal(true)}/>}
    {screen==="explore"   && <Explore pros={pros} onNav={nav} onDetail={p=>{setPro(p);setScreen("detail");}} onFab={()=>setModal(true)}/>}
    {screen==="detail"    && pro && <Detail pro={pro} onBack={()=>setScreen("explore")} onBook={()=>setScreen("booking")}/>}
    {screen==="booking"   && pro && <Booking pro={pro} onBack={()=>setScreen("detail")} onConfirm={b=>{setBookings(bk=>[...bk,b]);setScreen("success");}}/>}
    {screen==="bookings"  && <Bookings bookings={bookings} onNav={nav}/>}
    {screen==="success"   && bookings.length>0 && <Success booking={bookings[bookings.length-1]} onHome={()=>setScreen("home")}/>}
    {screen==="profile"   && <Profile city={city} onNav={nav}/>}
    {modal  && <ReqModal onClose={()=>setModal(false)}/>}
    {rating && <Rating onClose={()=>setRating(false)}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

</body>
</html>
